<!DOCTYPE html>
<html>
<head>
    <title>Cobalt</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1 id="app-title">Cobalt - {{MODEL_NAME}}</h1>
        <div class="chat-bar">
            <select id="chat-select" onchange="switchChat(this.value)"></select>
            <button id="new-chat-button" onclick="createNewChat()">New chat</button>
        </div>
        <div class="model-bar">
            <select id="model-select" onchange="selectModel(this.value)"></select>
            <button id="pull-selected-model-button" onclick="pullSelectedModel()">Pull selected</button>
            <input type="text" id="custom-model-input" placeholder="Type model to pull (e.g. llama3.1:8b)">
            <button id="pull-custom-model-button" onclick="pullCustomModel()">Pull typed model</button>
        </div>
        <div id="pull-status" class="status hidden"></div>
        <div id="chat"></div>
        <input type="text" id="input" placeholder="Ask me anything...">
        <button id="send-button" onclick="sendMessage()">Send</button>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
