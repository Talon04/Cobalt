<!DOCTYPE html>
<html>
<head>
    <title>Cobalt</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <div class="container">
        <h1 id="app-title">Cobalt - {{MODEL_NAME}}</h1>
        <div class="nav-links">
            <a href="/models/manage">Manage models</a>
            <a href="/settings">Settings</a>
        </div>
        <div class="chat-bar">
            <select id="chat-select" onchange="switchChat(this.value)"></select>
            <button id="rename-chat-button" onclick="renameCurrentChat()">Rename chat</button>
        </div>
        <div class="model-bar">
            <select id="model-select" onchange="selectModel(this.value)"></select>
        </div>
        <div id="chat"></div>
        <input type="text" id="input" placeholder="Ask me anything...">
        <button id="send-button" onclick="sendMessage()">Send</button>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
